openapi: 3.0.0
info:
  title: Vibe Commerce GECX Tools API
  description: Middleware API for CX Agent Studio to interact with the Vibe Commerce Retail catalog.
  version: 1.0.0
servers:
  - url: https://YOUR_CLOUD_RUN_URL_HERE
paths:
  /search_products:
    get:
      summary: Search for products in the Vibe Commerce catalog.
      operationId: searchProducts
      description: Returns a list of products matching the search query, with IDs and prices.
      parameters:
        - name: query
          in: query
          required: true
          description: The search term provided by the user (e.g., "banana yellow N64").
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Optional category to filter the search results.
          schema:
            type: string
      responses:
        "200":
          description: A list of matching products.
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        price:
                          type: number
                        uri:
                          type: string
                        description:
                          type: string

  /get_product_details:
    get:
      summary: Get full details for a specific product.
      operationId: getProductDetails
      description: Retrieves exact availability, detailed description, and categories for a given product ID string.
      parameters:
        - name: product_id
          in: query
          required: true
          description: The unique alphanumeric ID of the product.
          schema:
            type: string
      responses:
        "200":
          description: Full product details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  description:
                    type: string
                  price:
                    type: number
                  availability:
                    type: string
                  categories:
                    type: array
                    items:
                      type: string

  /get_support_info:
    get:
      summary: Retrieve customer support policies and contact info.
      operationId: getSupportInfo
      description: Returns text regarding return policy, shipping details, and contact methods.
      parameters:
        - name: topic
          in: query
          required: false
          description: Specific topic to query (e.g. "returns", "shipping", "contact").
          schema:
            type: string
      responses:
        "200":
          description: Support information JSON.
          content:
            application/json:
              schema:
                type: object
